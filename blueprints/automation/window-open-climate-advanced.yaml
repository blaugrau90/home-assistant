blueprint:
  name: "Window Open – Climate Off (Advanced Mode & Temperature Control)"
  description: >
    Turns off a climate device (heating/cooling) when a window opens,
    and controls it again after the window closes.
    Choose to restore the previous state, or set a specific HVAC mode.
    When setting a specific mode (not "auto"), you can also control
    the target temperature: restore the saved value, set a fixed one, or leave it unchanged.
  domain: automation
  source_url: https://github.com/blaugrau90/home-assistant
  input:
    window_entity:
      name: Window Sensor
      description: >
        The window sensor that controls the climate device.
        If you have multiple windows, create a group sensor.
      selector:
        entity:
          domain: binary_sensor
          device_class: window

    climate_target:
      name: Climate Device
      description: The climate device (heating/cooling) to be controlled.
      selector:
        entity:
          domain: climate

    minimum_open_time:
      name: Minimum Open Time
      description: Time in seconds to wait after opening before the climate device turns off.
      default: 12
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: seconds
          mode: slider
          step: 1

    minimum_close_time:
      name: Minimum Close Time
      description: Time in seconds to wait after closing before the climate device turns back on.
      default: 12
      selector:
        number:
          min: 0
          max: 300
          unit_of_measurement: seconds
          mode: slider
          step: 1

    restore_mode:
      name: Behavior When Window Closes
      description: >
        What should the climate device do when the window closes?
        "Restore previous state" restores the exact HVAC mode, temperature and preset from before opening.
        "Set specific mode" lets you define which mode and temperature to apply.
      default: restore_previous
      selector:
        select:
          options:
            - label: "Restore previous state"
              value: restore_previous
            - label: "Set specific mode"
              value: set_mode

    target_hvac_mode:
      name: Target HVAC Mode
      description: >
        Only applies when "Set specific mode" is selected above.
        The HVAC mode to set when the window closes.
        For "auto", no temperature will be changed regardless of the setting below.
      default: heat
      selector:
        select:
          options:
            - label: "Heat"
              value: heat
            - label: "Cool"
              value: cool
            - label: "Heat / Cool (heat_cool)"
              value: heat_cool
            - label: "Auto"
              value: auto

    temperature_behavior:
      name: Temperature Behavior
      description: >
        Only applies when "Set specific mode" is selected and the mode is not "auto".
        Choose how to handle the temperature when the window closes.
      default: restore_saved
      selector:
        select:
          options:
            - label: "Restore saved temperature (from before opening)"
              value: restore_saved
            - label: "Set a specific temperature"
              value: set_specific
            - label: "Do not change temperature"
              value: none

    target_temperature:
      name: Target Temperature
      description: >
        Only applies when "Set a specific temperature" is selected above.
      default: 20
      selector:
        number:
          min: 5
          max: 35
          unit_of_measurement: "°C"
          mode: slider
          step: 0.5

    open_action:
      name: Additional Action on Open (Optional)
      description: Action to perform when the window is opened (e.g. TTS announcement).
      default: []
      selector:
        action: {}

    close_action:
      name: Additional Action on Close (Optional)
      description: Action to perform when the window is closed again.
      default: []
      selector:
        action: {}

mode: restart

trigger:
  - platform: state
    entity_id: !input window_entity
    to: "on"

variables:
  climate_entity: !input climate_target
  restore_mode: !input restore_mode
  target_hvac_mode: !input target_hvac_mode
  temperature_behavior: !input temperature_behavior
  target_temperature: !input target_temperature
  saved_hvac_mode: "{{ states(climate_entity) }}"
  saved_temperature: "{{ state_attr(climate_entity, 'temperature') }}"
  saved_preset_mode: "{{ state_attr(climate_entity, 'preset_mode') }}"

condition:
  - condition: not
    conditions:
      - condition: state
        entity_id: !input climate_target
        state: "off"

action:
  # Wait the minimum open time
  - delay:
      seconds: !input minimum_open_time

  # Check if window is still open
  - condition: state
    entity_id: !input window_entity
    state: "on"

  # Turn off climate device
  - action: climate.turn_off
    target:
      entity_id: !input climate_target

  # Optional action on open
  - choose: []
    default: !input open_action

  # Wait for the window to close
  - wait_for_trigger:
      - platform: state
        entity_id: !input window_entity
        to: "off"

  # Wait the minimum close time
  - delay:
      seconds: !input minimum_close_time

  # Optional action on close
  - choose: []
    default: !input close_action

  # Control climate device based on user choice
  - choose:
      # --- Option 1: Restore previous state ---
      - conditions:
          - condition: template
            value_template: "{{ restore_mode == 'restore_previous' }}"
        sequence:
          - action: climate.set_hvac_mode
            target:
              entity_id: !input climate_target
            data:
              hvac_mode: "{{ saved_hvac_mode }}"
          - if:
              - condition: template
                value_template: "{{ saved_temperature is not none }}"
            then:
              - action: climate.set_temperature
                target:
                  entity_id: !input climate_target
                data:
                  temperature: "{{ saved_temperature }}"
          - if:
              - condition: template
                value_template: "{{ saved_preset_mode is not none }}"
            then:
              - action: climate.set_preset_mode
                target:
                  entity_id: !input climate_target
                data:
                  preset_mode: "{{ saved_preset_mode }}"

      # --- Option 2: Set specific HVAC mode ---
      - conditions:
          - condition: template
            value_template: "{{ restore_mode == 'set_mode' }}"
        sequence:
          # Set chosen HVAC mode
          - action: climate.set_hvac_mode
            target:
              entity_id: !input climate_target
            data:
              hvac_mode: "{{ target_hvac_mode }}"
          # Handle temperature only if mode is not "auto"
          - if:
              - condition: template
                value_template: "{{ target_hvac_mode != 'auto' }}"
            then:
              - choose:
                  # Restore saved temperature
                  - conditions:
                      - condition: template
                        value_template: "{{ temperature_behavior == 'restore_saved' and saved_temperature is not none }}"
                    sequence:
                      - action: climate.set_temperature
                        target:
                          entity_id: !input climate_target
                        data:
                          temperature: "{{ saved_temperature }}"
                  # Set a specific temperature
                  - conditions:
                      - condition: template
                        value_template: "{{ temperature_behavior == 'set_specific' }}"
                    sequence:
                      - action: climate.set_temperature
                        target:
                          entity_id: !input climate_target
                        data:
                          temperature: "{{ target_temperature }}"
                # temperature_behavior == "none": do nothing
